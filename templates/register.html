<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mail Archiver — Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container login-container">
        <a href="https://www.dec-llc.biz" target="_blank"><img src="{{ url_for('static', filename='logo.svg') }}" alt="DEC-LLC" style="height:64px;margin-bottom:12px;"></a>
        <h1 style="color:#0f2b46;">Mail Archiver</h1>
        <p class="subtitle">Create an account</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash">
            {% for msg in messages %}<p>{{ msg }}</p>{% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('register') }}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autofocus required
                   autocomplete="username" placeholder="Choose a username (alphanumeric)">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   autocomplete="new-password" placeholder="At least 6 characters">

            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1.5rem">Create Account</button>
        </form>
        <p style="margin-top:1rem;font-size:0.9rem;color:#666">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</body>
</html>
